      context: ./ms-vacunas
      dockerfile: Dockerfile
    container_name: vitalpets-vacunas
    ports:
      - "8088:8088"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-vitalpets:3306/vacunas_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=vitalpets
      - SPRING_DATASOURCE_PASSWORD=vitalpets123
