    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-vitalpets:3306/facturacion_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=vitalpets
      - SPRING_DATASOURCE_PASSWORD=vitalpets123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
