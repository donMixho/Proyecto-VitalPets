      context: ./ms-historial
      dockerfile: Dockerfile
    container_name: vitalpets-historial
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-vitalpets:3306/historial_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=vitalpets
      - SPRING_DATASOURCE_PASSWORD=vitalpets123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - SPRING_FLYWAY_ENABLED=true
    depends_on:
      mysql-vitalpets:
        condition: service_healthy
    networks:
      - vitalpets-network
    restart: on-failure

  ms-inventario:
