      context: ./ms-laboratorio
      dockerfile: Dockerfile
    container_name: vitalpets-laboratorio
    ports:
      - "8089:8089"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-vitalpets:3306/laboratorio_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=vitalpets
      - SPRING_DATASOURCE_PASSWORD=vitalpets123
