  ms-gateway:
    build:
      context: ./ms-gateway
      dockerfile: Dockerfile
    container_name: vitalpets-gateway
    ports:
      - "8080:8080"
    environment:
      # URIs de los microservicios para que el RouteLocator (GatewayConfig.java)
      # los alcance por nombre de contenedor dentro de la red Docker.
      # Sobrescriben a vitalpets.services.* del application.yml (que usa localhost).
      - VITALPETS_SERVICES_MASCOTAS=http://vitalpets-mascotas:8081
      - VITALPETS_SERVICES_CLIENTES=http://vitalpets-clientes:8082
      - VITALPETS_SERVICES_CITAS=http://vitalpets-citas:8083
      - VITALPETS_SERVICES_HISTORIAL=http://vitalpets-historial:8084
      - VITALPETS_SERVICES_INVENTARIO=http://vitalpets-inventario:8085
      - VITALPETS_SERVICES_FACTURACION=http://vitalpets-facturacion:8086
      - VITALPETS_SERVICES_PERSONAL=http://vitalpets-personal:8087
      - VITALPETS_SERVICES_VACUNAS=http://vitalpets-vacunas:8088
      - VITALPETS_SERVICES_LABORATORIO=http://vitalpets-laboratorio:8089
      - VITALPETS_SERVICES_USUARIOS=http://vitalpets-usuarios:8090
    depends_on:
      - ms-mascotas
      - ms-clientes
      - ms-citas
      - ms-historial
      - ms-inventario
      - ms-facturacion
      - ms-personal
      - ms-vacunas
      - ms-laboratorio
      - ms-usuarios
    networks:
      - vitalpets-network
    restart: on-failure

volumes:
  mysql_data:

networks:
  vitalpets-network:
    driver: bridge
