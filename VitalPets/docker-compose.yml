  ms-gateway:
    build:
      context: ./ms-gateway
      dockerfile: Dockerfile
    container_name: vitalpets-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_CLOUD_GATEWAY_ROUTES[0]_ID=ms-mascotas
      - SPRING_CLOUD_GATEWAY_ROUTES[0]_URI=http://vitalpets-mascotas:8081
      - SPRING_CLOUD_GATEWAY_ROUTES[0]_PREDICATES[0]=Path=/api/mascotas/**
      - SPRING_CLOUD_GATEWAY_ROUTES[1]_ID=ms-clientes
      - SPRING_CLOUD_GATEWAY_ROUTES[1]_URI=http://vitalpets-clientes:8082
      - SPRING_CLOUD_GATEWAY_ROUTES[1]_PREDICATES[0]=Path=/api/clientes/**
      - SPRING_CLOUD_GATEWAY_ROUTES[2]_ID=ms-citas
      - SPRING_CLOUD_GATEWAY_ROUTES[2]_URI=http://vitalpets-citas:8083
      - SPRING_CLOUD_GATEWAY_ROUTES[2]_PREDICATES[0]=Path=/api/citas/**
      - SPRING_CLOUD_GATEWAY_ROUTES[3]_ID=ms-historial
      - SPRING_CLOUD_GATEWAY_ROUTES[3]_URI=http://vitalpets-historial:8084
      - SPRING_CLOUD_GATEWAY_ROUTES[3]_PREDICATES[0]=Path=/api/historial/**
      - SPRING_CLOUD_GATEWAY_ROUTES[4]_ID=ms-inventario
      - SPRING_CLOUD_GATEWAY_ROUTES[4]_URI=http://vitalpets-inventario:8085
      - SPRING_CLOUD_GATEWAY_ROUTES[4]_PREDICATES[0]=Path=/api/productos/**
      - SPRING_CLOUD_GATEWAY_ROUTES[5]_ID=ms-facturacion
      - SPRING_CLOUD_GATEWAY_ROUTES[5]_URI=http://vitalpets-facturacion:8086
      - SPRING_CLOUD_GATEWAY_ROUTES[5]_PREDICATES[0]=Path=/api/facturas/**
      - SPRING_CLOUD_GATEWAY_ROUTES[6]_ID=ms-personal
      - SPRING_CLOUD_GATEWAY_ROUTES[6]_URI=http://vitalpets-personal:8087
      - SPRING_CLOUD_GATEWAY_ROUTES[6]_PREDICATES[0]=Path=/api/personal/**
      - SPRING_CLOUD_GATEWAY_ROUTES[7]_ID=ms-vacunas
      - SPRING_CLOUD_GATEWAY_ROUTES[7]_URI=http://vitalpets-vacunas:8088
