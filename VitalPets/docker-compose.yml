        condition: service_healthy
    networks:
      - vitalpets-network
    restart: on-failure

  ms-personal:
    build:
      context: ./ms-personal
      dockerfile: Dockerfile
    container_name: vitalpets-personal
    ports:
      - "8087:8087"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-vitalpets:3306/personal_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=vitalpets
      - SPRING_DATASOURCE_PASSWORD=vitalpets123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
