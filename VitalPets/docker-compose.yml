version: '3.8'
services:
  mysql-vitalpets:
    image: mysql:8.0
    container_name: mysql-vitalpets
    environment:
      MYSQL_ROOT_PASSWORD: vitalpets123
      MYSQL_USER: vitalpets
      MYSQL_PASSWORD: vitalpets123
    ports:
      - "3307:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "vitalpets", "-pvitalpets123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vitalpets-network

  ms-mascotas:
    build:
      context: ./ms-mascotas
      dockerfile: Dockerfile
    container_name: vitalpets-mascotas
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-vitalpets:3306/mascotas_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=vitalpets
      - SPRING_DATASOURCE_PASSWORD=vitalpets123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - SPRING_FLYWAY_ENABLED=true
    depends_on:
      mysql-vitalpets:
        condition: service_healthy
    networks:
      - vitalpets-network
    restart: on-failure

  ms-clientes:
    build:
      context: ./ms-clientes
      dockerfile: Dockerfile
    container_name: vitalpets-clientes
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-vitalpets:3306/clientes_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=vitalpets
      - SPRING_DATASOURCE_PASSWORD=vitalpets123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - SPRING_FLYWAY_ENABLED=true
    depends_on:
      mysql-vitalpets:
        condition: service_healthy
    networks:
      - vitalpets-network
    restart: on-failure

  ms-citas:
