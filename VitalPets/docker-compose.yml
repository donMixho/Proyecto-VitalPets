      - ms-mascotas
      - ms-clientes
      - ms-citas
      - ms-historial
      - ms-inventario
      - ms-facturacion
      - ms-personal
      - ms-vacunas
      - ms-laboratorio
      - ms-usuarios
    networks:
      - vitalpets-network
    restart: on-failure

volumes:
  mysql_data:

networks:
  vitalpets-network:
    driver: bridge
