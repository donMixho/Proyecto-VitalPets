server:
  port: 8080

spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      routes:
        - id: ms-mascotas
          uri: http://localhost:8081
          predicates:
            - Path=/api/mascotas/**

        - id: ms-clientes
          uri: http://localhost:8082
          predicates:
            - Path=/api/clientes/**

        - id: ms-citas
          uri: http://localhost:8083
          predicates:
            - Path=/api/citas/**

        - id: ms-historial
          uri: http://localhost:8084
          predicates:
            - Path=/api/historial/**

        - id: ms-inventario
          uri: http://localhost:8085
          predicates:
            - Path=/api/productos/**

        - id: ms-facturacion
          uri: http://localhost:8086
          predicates:
            - Path=/api/facturas/**

        - id: ms-personal
          uri: http://localhost:8087
          predicates:
            - Path=/api/personal/**

        - id: ms-vacunas
          uri: http://localhost:8088
          predicates:
            - Path=/api/vacunas/**

        - id: ms-laboratorio
          uri: http://localhost:8089
          predicates:
            - Path=/api/examenes/**

        - id: ms-usuarios
          uri: http://localhost:8090
          predicates:
            - Path=/api/usuarios/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
