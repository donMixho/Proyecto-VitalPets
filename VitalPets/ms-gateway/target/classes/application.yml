server:
  port: 8080

spring:
  application:
    name: ms-gateway
  main:
    # El Gateway es WebFlux/reactivo (NO debe arrancar como servlet web)
    web-application-type: reactive
  cloud:
    gateway:
      # Las rutas se definen de forma programática en GatewayConfig.java
      # (RouteLocatorBuilder), usando las URIs de vitalpets.services.* (abajo).

      # Sin descubrimiento de servicios (no hay Eureka/Consul): rutas estáticas
      discovery:
        locator:
          enabled: false

      # Timeouts del cliente HTTP del Gateway hacia los microservicios
      httpclient:
        connect-timeout: 3000
        response-timeout: 10s

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"

# URIs de los microservicios destino del Gateway.
# Valores por defecto para EJECUCIÓN LOCAL (localhost).
# En Docker se sobrescriben con las variables de entorno VITALPETS_SERVICES_*
# definidas en docker-compose.yml (nombres de contenedor).
vitalpets:
  services:
    mascotas: http://localhost:8081
    clientes: http://localhost:8082
    citas: http://localhost:8083
    historial: http://localhost:8084
    inventario: http://localhost:8085
    facturacion: http://localhost:8086
    personal: http://localhost:8087
    vacunas: http://localhost:8088
    laboratorio: http://localhost:8089
    usuarios: http://localhost:8090

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
