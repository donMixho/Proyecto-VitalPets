server:
  port: 8080

spring:
  application:
    name: ms-gateway
  main:
    # El Gateway es WebFlux/reactivo (NO debe arrancar como servlet web)
    web-application-type: reactive
  cloud:
    gateway:
      # Las rutas se definen de forma programática en GatewayConfig.java
      # (RouteLocatorBuilder). NO se duplican aquí para evitar conflictos.

      # Sin descubrimiento de servicios (no hay Eureka/Consul): rutas estáticas
      discovery:
        locator:
          enabled: false

      # Timeouts del cliente HTTP del Gateway hacia los microservicios
      httpclient:
        connect-timeout: 3000
        response-timeout: 10s

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
