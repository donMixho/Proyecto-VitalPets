<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VitalPets — Sistema de Gestión Veterinaria</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --verde: #78C4A7;
    --verde-oscuro: #55ae8e;
    --fondo: #F9FCFB;
    --verde-suave: #CEEADF;
    --texto: #1e2e28;
    --texto-2: #5a7a6e;
    --rojo: #e74c3c;
  }

  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: var(--fondo);
    color: var(--texto);
    height: 100vh;
    overflow: hidden;
  }

  /* ════════════════════════════════════════
     VISTA 1 — LOGIN
  ════════════════════════════════════════ */
  #vistaLogin {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    background: linear-gradient(145deg, #e8f8f2 0%, #F9FCFB 60%, #CEEADF 100%);
  }

  .brand { text-align: center; margin-bottom: 1.8rem; }
  .brand .logo { font-size: 3.5rem; line-height: 1; }
  .brand h1 { font-size: 1.8rem; font-weight: 700; color: var(--texto); margin-top: 0.3rem; }
  .brand p { font-size: 0.9rem; color: var(--texto-2); margin-top: 0.25rem; }

  .login-card {
    background: #fff;
    border: 1.5px solid var(--verde-suave);
    border-radius: 18px;
    padding: 2.2rem 2.4rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 36px rgba(120,196,167,0.18);
  }
  .login-card h2 { font-size: 1.1rem; text-align: center; margin-bottom: 1.5rem; color: var(--texto); }

  .field { margin-bottom: 1.1rem; }
  label { display:block; font-size: 0.76rem; font-weight: 700; color: var(--texto-2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.4rem; }

  input, select, textarea {
    width: 100%;
    padding: 0.7rem 0.9rem;
    border: 1.5px solid var(--verde-suave);
    border-radius: 9px;
    font-size: 0.92rem;
    font-family: inherit;
    color: var(--texto);
    background: var(--fondo);
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--verde);
    box-shadow: 0 0 0 3px rgba(120,196,167,0.18);
  }
  textarea { resize: vertical; min-height: 42px; }
  select { cursor: pointer; }

  .btn-primary {
    background: var(--verde);
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 0.75rem 1.2rem;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s;
  }
  .btn-primary:hover { background: var(--verde-oscuro); }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  #btnLogin { width: 100%; margin-top: 0.4rem; padding: 0.85rem; font-size: 1rem; }

  .login-error {
    display: none;
    margin-top: 1rem;
    padding: 0.7rem 0.95rem;
    border-radius: 9px;
    background: #fff0f0;
    border: 1.5px solid #f5c6c6;
    color: #c0392b;
    font-size: 0.86rem;
    font-weight: 500;
  }

  /* ════════════════════════════════════════
     VISTA 2 — DASHBOARD
  ════════════════════════════════════════ */
  #vistaDashboard { display: none; flex-direction: column; height: 100vh; }

  .dash-header {
    height: 60px;
    flex-shrink: 0;
    background: #fff;
    border-bottom: 1.5px solid var(--verde-suave);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
  }
  .dash-header .hbrand { display: flex; align-items: center; gap: 0.6rem; }
  .dash-header .hbrand .logo { font-size: 1.7rem; }
  .dash-header .hbrand h1 { font-size: 1.15rem; font-weight: 700; color: var(--texto); }

  .hright { display: flex; align-items: center; gap: 1rem; }
  .huser { text-align: right; line-height: 1.2; }
  .huser .name { font-size: 0.88rem; font-weight: 700; color: var(--texto); }

  .rol-badge {
    display: inline-block;
    font-size: 0.66rem;
    font-weight: 700;
    padding: 0.16rem 0.55rem;
    border-radius: 20px;
    margin-top: 0.15rem;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .badge-ADMIN         { background: #fffbe6; color: #b8860b; }
  .badge-VETERINARIO   { background: #e8fff4; color: #1a6b40; }
  .badge-RECEPCIONISTA { background: #eef2ff; color: #3b4fc4; }
  .badge-ESTILISTA     { background: #fce8f5; color: #8b256e; }
  .badge-LABORATORISTA { background: #fff3e8; color: #9b4a10; }

  .btn-logout {
    background: #fff;
    color: var(--rojo);
    border: 1.5px solid #f1b5af;
    border-radius: 8px;
    padding: 0.45rem 0.9rem;
    font-size: 0.82rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.18s;
    white-space: nowrap;
  }
  .btn-logout:hover { background: #fff0f0; }

  .dash-body { flex: 1; display: flex; min-height: 0; }

  /* Sidebar */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: #fff;
    border-right: 1.5px solid var(--verde-suave);
    overflow-y: auto;
    padding: 0.8rem 0;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 0.75rem 1.2rem;
    border-left: 3px solid transparent;
    cursor: pointer;
    color: var(--texto-2);
    font-size: 0.9rem;
    font-weight: 600;
    transition: background 0.18s, color 0.18s;
  }
  .sidebar-item:hover { background: var(--fondo); }
  .sidebar-item.active {
    background: var(--verde-suave);
    border-left-color: var(--verde);
    color: var(--texto);
    font-weight: 700;
  }
  .sidebar-item .si-icon { font-size: 1.1rem; width: 1.4rem; text-align: center; }
  .sidebar-item .si-name { flex: 1; }
  .sidebar-item .si-lock { font-size: 0.8rem; opacity: 0.7; }

  /* Contenido principal */
  #contenidoPrincipal {
    flex: 1;
    overflow-y: auto;
    padding: 2rem;
    background: var(--fondo);
  }

  .modulo-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
    gap: 0.8rem;
  }
  .modulo-titulo { font-size: 1.4rem; font-weight: 700; color: var(--texto); }

  .btn-sec {
    background: #fff;
    color: var(--verde-oscuro);
    border: 1.5px solid var(--verde);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.18s;
  }
  .btn-sec:hover { background: #e8f8f2; }

  /* Formulario */
  .form-card {
    background: #fff;
    border: 1.5px solid var(--verde-suave);
    border-radius: 12px;
    padding: 1.4rem 1.5rem;
    margin-bottom: 1.6rem;
    box-shadow: 0 4px 16px rgba(120,196,167,0.08);
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.9rem 1.2rem;
    margin-bottom: 1.1rem;
  }
  @media (max-width: 680px) { .form-grid { grid-template-columns: 1fr; } }
  .form-field.full { grid-column: 1 / -1; }
  .form-field label { font-size: 0.72rem; }

  .solo-lectura {
    background: #eef2ff;
    border: 1.5px solid #cdd7fb;
    color: #3b4fc4;
    border-radius: 10px;
    padding: 0.8rem 1rem;
    font-size: 0.88rem;
    margin-bottom: 1.4rem;
  }

  /* Tabla */
  .tabla-wrap {
    background: #fff;
    border: 1.5px solid var(--verde-suave);
    border-radius: 12px;
    overflow: hidden;
  }
  .tabla-scroll { overflow-x: auto; }
  table.data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .data-table thead th {
    background: var(--verde-suave);
    color: var(--texto);
    text-align: left;
    padding: 0.7rem 0.9rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .data-table tbody td { padding: 0.65rem 0.9rem; color: var(--texto); white-space: nowrap; }
  .data-table tbody tr:nth-child(odd)  { background: #fff; }
  .data-table tbody tr:nth-child(even) { background: var(--fondo); }
  .data-table tbody tr:hover { background: #e8f8f2; }
  .acciones-cell { display: flex; gap: 0.35rem; flex-wrap: wrap; }

  .btn-sm { font-size: 0.74rem; padding: 0.32rem 0.6rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-family: inherit; }
  .btn-danger { background: var(--rojo); color: #fff; }
  .btn-danger:hover { background: #c0392b; }
  .btn-mini-sec { background: #fff; color: var(--verde-oscuro); border: 1.5px solid var(--verde); }
  .btn-mini-sec:hover { background: #e8f8f2; }
  .btn-mini-pri { background: var(--verde); color: #fff; }
  .btn-mini-pri:hover { background: var(--verde-oscuro); }

  .cargando, .empty, .error-tabla { padding: 1.4rem; text-align: center; color: var(--texto-2); font-size: 0.9rem; }
  .error-tabla { color: #c0392b; }

  /* Feedback */
  .feedback {
    display: none;
    margin-bottom: 1.1rem;
    padding: 0.75rem 1rem;
    border-radius: 9px;
    font-size: 0.88rem;
    font-weight: 600;
  }
  .feedback.show { display: block; }
  .feedback.exito { background: #e8fff4; border: 1.5px solid var(--verde); color: #1a6b40; }
  .feedback.error { background: #fff0f0; border: 1.5px solid #f5c6c6; color: #c0392b; }
</style>
</head>
<body>

<!-- ════════════ VISTA 1 — LOGIN ════════════ -->
<div id="vistaLogin">
  <div class="brand">
    <div class="logo">🐾</div>
    <h1>VitalPets</h1>
    <p>Sistema de Gestión Veterinaria</p>
  </div>

  <div class="login-card">
    <h2>Iniciar Sesión</h2>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="field">
        <label for="username">Usuario</label>
        <input id="username" type="text" placeholder="Ingresa tu usuario" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-primary" id="btnLogin">Ingresar al sistema</button>
    </form>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ════════════ VISTA 2 — DASHBOARD ════════════ -->
<div id="vistaDashboard">
  <header class="dash-header">
    <div class="hbrand">
      <span class="logo">🐾</span>
      <h1>VitalPets</h1>
    </div>
    <div class="hright">
      <div class="huser">
        <div class="name" id="dashUser"></div>
        <span class="rol-badge" id="dashRol"></span>
      </div>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </header>

  <div class="dash-body">
    <aside class="sidebar" id="sidebarNav"></aside>
    <main id="contenidoPrincipal"></main>
  </div>
</div>

<script>
/* ══════════════ CONFIGURACIÓN ══════════════ */
const API = 'http://localhost:8080';

// Estado en variables JS (NO localStorage / sessionStorage / cookies)
let tokenActual = null;
let rolActual   = null;
let userActual  = null;
let moduloActual = null;

const PERMISOS = {
  ADMIN: {
    mascotas:'escribir', clientes:'escribir', citas:'escribir', historial:'escribir',
    inventario:'escribir', facturacion:'escribir', vacunas:'escribir',
    laboratorio:'escribir', personal:'escribir', usuarios:'escribir'
  },
  VETERINARIO: {
    mascotas:'escribir', clientes:'ver', citas:'ver', historial:'escribir',
    inventario:'ver', vacunas:'escribir', laboratorio:'escribir'
  },
  RECEPCIONISTA: {
    mascotas:'escribir', clientes:'escribir', citas:'escribir',
    inventario:'ver', facturacion:'escribir', personal:'ver'
  },
  ESTILISTA: {
    mascotas:'ver', clientes:'ver', citas:'ver'
  },
  LABORATORISTA: {
    mascotas:'ver', historial:'ver', laboratorio:'escribir'
  }
};

function puedoEscribir(modulo) { return PERMISOS[rolActual]?.[modulo] === 'escribir'; }
function puedoVer(modulo)      { return !!PERMISOS[rolActual]?.[modulo]; }

// Orden de los módulos en el sidebar
const ORDEN_MODULOS = ['mascotas','clientes','citas','historial','inventario','facturacion','vacunas','laboratorio','personal','usuarios'];

const MODULOS = {
  mascotas: {
    titulo:'Mascotas', icono:'🐶', endpoint:'/api/mascotas', acciones:['eliminar'],
    campos:[
      {name:'nombre',      label:'Nombre',     type:'text',   required:true},
      {name:'especie',     label:'Especie',    type:'select', options:['PERRO','GATO','AVE','REPTIL','ROEDOR','OTRO']},
      {name:'raza',        label:'Raza',       type:'text'},
      {name:'edadAnios',   label:'Edad (años)',type:'number'},
      {name:'sexo',        label:'Sexo',       type:'select', options:['MACHO','HEMBRA']},
      {name:'pesoKg',      label:'Peso (kg)',  type:'number', decimal:true},
      {name:'colorPelaje', label:'Color pelaje', type:'text'},
      {name:'clienteId',   label:'Cliente ID', type:'number', required:true}
    ],
    columnas:[
      {label:'ID', key:'id'}, {label:'Nombre', key:'nombre'}, {label:'Especie', key:'especie'},
      {label:'Raza', key:'raza'}, {label:'Edad', key:'edadAnios'}, {label:'Peso', key:'pesoKg'},
      {label:'Cliente ID', key:'clienteId'}
    ]
  },
  clientes: {
    titulo:'Clientes', icono:'👥', endpoint:'/api/clientes', acciones:['eliminar'],
    campos:[
      {name:'nombre',          label:'Nombre',    type:'text',   required:true},
      {name:'apellido',        label:'Apellido',  type:'text',   required:true},
      {name:'tipoDocumento',   label:'Tipo documento', type:'select', options:['RUT','PASAPORTE','DNI']},
      {name:'numeroDocumento', label:'N° documento', type:'text', required:true},
      {name:'telefono',        label:'Teléfono',  type:'text'},
      {name:'email',           label:'Email',     type:'email'},
      {name:'direccion',       label:'Dirección', type:'text'}
    ],
    columnas:[
      {label:'ID', key:'id'}, {label:'Nombre', key:'nombre'}, {label:'Apellido', key:'apellido'},
      {label:'Documento', fmt:r=>`${r.tipoDocumento||''} ${r.numeroDocumento||''}`.trim()},
      {label:'Teléfono', key:'telefono'}, {label:'Email', key:'email'}
    ]
  },
  citas: {
    titulo:'Citas', icono:'📅', endpoint:'/api/citas', acciones:['eliminar'], labelEliminar:'Cancelar',
    campos:[
      {name:'mascotaId',    label:'Mascota ID', type:'number', required:true},
      {name:'clienteId',    label:'Cliente ID', type:'number', required:true},
      {name:'personalId',   label:'Personal ID',type:'number', required:true},
      {name:'fecha',        label:'Fecha',      type:'date',   required:true},
      {name:'hora',         label:'Hora',       type:'time',   required:true},
      {name:'tipoServicio', label:'Tipo servicio', type:'select', options:['CONSULTA','PELUQUERIA','VACUNA','EXAMEN','CIRUGIA','OTRO']},
      {name:'motivo',       label:'Motivo',     type:'textarea'}
    ],
    columnas:[
      {label:'ID', key:'id'}, {label:'Mascota ID', key:'mascotaId'}, {label:'Cliente ID', key:'clienteId'},
      {label:'Fecha', fmt:soloFecha}, {label:'Hora', fmt:soloHora},
      {label:'Servicio', key:'tipoServicio'}, {label:'Motivo', fmt:r=>r.motivo||r.observaciones}
    ],
    // El backend espera un LocalDateTime (fechaHora) y 'observaciones'; combinamos fecha+hora.
    ajustarPayload:o=>{
      if(o.fecha && o.hora) o.fechaHora = o.fecha + 'T' + o.hora + ':00';
      if(o.motivo!==undefined) o.observaciones = o.motivo;
    }
  },
  historial: {
    titulo:'Historial Clínico', icono:'📋', endpoint:'/api/historial', acciones:[],
    campos:[
      {name:'mascotaId',    label:'Mascota ID', type:'number', required:true},
      {name:'personalId',   label:'Personal ID',type:'number', required:true},
      {name:'fecha',        label:'Fecha',      type:'date',   required:true},
      {name:'diagnostico',  label:'Diagnóstico',type:'textarea', required:true},
      {name:'tratamiento',  label:'Tratamiento',type:'textarea'},
      {name:'observaciones',label:'Observaciones', type:'textarea'}
    ],
    columnas:[
      {label:'ID', key:'id'}, {label:'Mascota ID', key:'mascotaId'},
      {label:'Fecha', fmt:soloFecha}, {label:'Diagnóstico', key:'diagnostico'},
      {label:'Tratamiento', key:'tratamiento'}, {label:'Personal ID', key:'personalId'}
    ],
    // El backend usa 'fechaEvento'
    ajustarPayload:o=>{ if(o.fecha!==undefined) o.fechaEvento = o.fecha; }
  },
  inventario: {
    titulo:'Inventario', icono:'📦', endpoint:'/api/productos', acciones:['stock','eliminar'],
    campos:[
      {name:'nombre',       label:'Nombre',     type:'text',   required:true},
      {name:'categoria',    label:'Categoría',  type:'select', options:['MEDICAMENTO','HERRAMIENTA','INSUMO','ALIMENTO','OTRO']},
      {name:'stock',        label:'Stock',      type:'number', required:true},
      {name:'stockMinimo',  label:'Stock mínimo', type:'number'},
      {name:'precio',       label:'Precio',     type:'number', decimal:true},
      {name:'unidadMedida', label:'Unidad medida (mg, ml, unidad)', type:'text'}
    ],
    columnas:[
      {label:'ID', key:'id'}, {label:'Nombre', key:'nombre'}, {label:'Categoría', key:'categoria'},
      {label:'Stock', key:'stock'}, {label:'Stock Mín', key:'stockMinimo'},
      {label:'Precio', key:'precio'}, {label:'Unidad', key:'unidadMedida'}
    ]
  },
  facturacion: {
    titulo:'Facturación', icono:'💳', endpoint:'/api/facturas', acciones:['pagar'],
    campos:[
      {name:'clienteId',  label:'Cliente ID', type:'number', required:true},
      {name:'citaId',     label:'Cita ID',    type:'number'},
      {name:'subtotal',   label:'Subtotal',   type:'number', decimal:true},
      {name:'total',      label:'Total',      type:'number', decimal:true, required:true},
      {name:'metodoPago', label:'Método de pago', type:'select', options:['EFECTIVO','TARJETA_DEBITO','TARJETA_CREDITO','TRANSFERENCIA']}
    ],
    columnas:[
      {label:'ID', key:'id'}, {label:'Cliente ID', key:'clienteId'}, {label:'Total', key:'total'},
      {label:'Método Pago', key:'metodoPago'}, {label:'Estado', key:'estado'}
    ]
  },
  vacunas: {
    titulo:'Vacunas', icono:'💉', endpoint:'/api/vacunas', acciones:['eliminar'],
    campos:[
      {name:'mascotaId',       label:'Mascota ID',  type:'number', required:true},
      {name:'personalId',      label:'Personal ID', type:'number', required:true},
      {name:'nombreVacuna',    label:'Nombre vacuna', type:'text', required:true},
      {name:'fechaAplicacion', label:'Fecha aplicación', type:'date', required:true},
      {name:'proximaDosis',    label:'Próxima dosis', type:'date'},
      {name:'observaciones',   label:'Observaciones', type:'text'}
    ],
    columnas:[
      {label:'ID', key:'id'}, {label:'Mascota ID', key:'mascotaId'}, {label:'Vacuna', key:'nombreVacuna'},
      {label:'Fecha Aplicación', key:'fechaAplicacion'}, {label:'Próxima Dosis', key:'proximaDosis'},
      {label:'Personal ID', key:'personalId'}
    ]
  },
  laboratorio: {
    titulo:'Laboratorio', icono:'🔬', endpoint:'/api/examenes', acciones:['eliminar'],
    campos:[
      {name:'mascotaId',      label:'Mascota ID', type:'number', required:true},
      {name:'tipoExamen',     label:'Tipo examen', type:'select', options:['HEMOGRAMA','BIOQUIMICA','ORINA','COPROLOGICO','RADIOGRAFIA','ECOGRAFIA','OTRO']},
      {name:'fechaSolicitud', label:'Fecha solicitud', type:'date', required:true},
      {name:'resultado',      label:'Resultado',  type:'textarea'},
      {name:'observaciones',  label:'Observaciones', type:'textarea'},
      {name:'estado',         label:'Estado',     type:'select', options:['PENDIENTE','EN_PROCESO','COMPLETADO']}
    ],
    columnas:[
      {label:'ID', key:'id'}, {label:'Mascota ID', key:'mascotaId'}, {label:'Tipo Examen', key:'tipoExamen'},
      {label:'Fecha', fmt:r=>r.fechaSolicitud||r.fecha}, {label:'Estado', key:'estado'}, {label:'Resultado', key:'resultado'}
    ]
  },
  personal: {
    titulo:'Personal', icono:'👨‍⚕️', endpoint:'/api/personal', acciones:['eliminar'], labelEliminar:'Desactivar',
    campos:[
      {name:'nombre',       label:'Nombre',   type:'text', required:true},
      {name:'apellido',     label:'Apellido', type:'text', required:true},
      {name:'especialidad', label:'Especialidad', type:'select', options:['VETERINARIO_GENERAL','CIRUJANO','DERMATOLOGO','ESTILISTA','RECEPCIONISTA','LABORATORISTA','ADMINISTRATIVO']},
      {name:'telefono',     label:'Teléfono', type:'text'},
      {name:'email',        label:'Email',    type:'email'},
      {name:'profesion',    label:'Profesión',type:'text'}
    ],
    columnas:[
      {label:'ID', key:'id'}, {label:'Nombre', key:'nombre'}, {label:'Apellido', key:'apellido'},
      {label:'Especialidad', key:'especialidad'}, {label:'Email', key:'email'}, {label:'Teléfono', key:'telefono'}
    ]
  },
  usuarios: {
    titulo:'Usuarios', icono:'🔐', endpoint:'/api/usuarios', acciones:['eliminar'], labelEliminar:'Desactivar',
    campos:[
      {name:'username',   label:'Username', type:'text',     required:true},
      {name:'password',   label:'Password', type:'password', required:true},
      {name:'rol',        label:'Rol',      type:'select',   options:['ADMIN','VETERINARIO','RECEPCIONISTA','ESTILISTA','LABORATORISTA']},
      {name:'personalId', label:'Personal ID', type:'number'}
    ],
    columnas:[
      {label:'ID', key:'id'}, {label:'Username', key:'username'}, {label:'Rol', key:'rol'}, {label:'Personal ID', key:'personalId'}
    ]
  }
};

/* ══════════════ HELPERS ══════════════ */
function soloFecha(r){
  if(r.fecha) return r.fecha;
  if(r.fechaHora) return String(r.fechaHora).split('T')[0];
  if(r.fechaEvento) return String(r.fechaEvento).split('T')[0];
  return '';
}
function soloHora(r){
  if(r.hora) return r.hora;
  if(r.fechaHora){ const p = String(r.fechaHora).split('T')[1]; return p ? p.slice(0,5) : ''; }
  return '';
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function parseError(text, status){
  try { const j = JSON.parse(text); return j.error || j.message || j.detalle || ('Error ' + status); }
  catch(_) { return 'Error ' + status; }
}
// Las respuestas pueden venir como array directo o envueltas en HATEOAS (_embedded)
function extraerLista(data){
  if (Array.isArray(data)) return data;
  if (data && data._embedded) {
    for (const v of Object.values(data._embedded)) if (Array.isArray(v)) return v;
  }
  if (data && Array.isArray(data.content)) return data.content;
  return [];
}

// fetch con token; maneja 401 globalmente
async function apiFetch(path, options = {}) {
  const opts = { ...options, headers: { ...(options.headers || {}) } };
  if (tokenActual) opts.headers['Authorization'] = 'Bearer ' + tokenActual;
  if (opts.body && !opts.headers['Content-Type']) opts.headers['Content-Type'] = 'application/json';
  const res = await fetch(API + path, opts);
  if (res.status === 401) { sesionExpirada(); throw new Error('401'); }
  return res;
}

/* ══════════════ LOGIN ══════════════ */
async function handleLogin(e){
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn   = document.getElementById('btnLogin');
  const errEl = document.getElementById('loginError');

  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Verificando...';

  try {
    const res = await fetch(API + '/api/usuarios/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    const text = await res.text();
    if (!res.ok) throw new Error(parseError(text, res.status));

    const data = JSON.parse(text);
    tokenActual = data.token;
    rolActual   = data.rol;
    userActual  = data.username;
    entrarDashboard();
  } catch (err) {
    errEl.textContent = '⚠️ ' + (err.message === 'Failed to fetch'
      ? 'No se pudo conectar con el servidor (¿está el Gateway en :8080?)'
      : (err.message || 'Credenciales inválidas'));
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Ingresar al sistema';
  }
}

/* ══════════════ DASHBOARD ══════════════ */
function entrarDashboard(){
  document.getElementById('vistaLogin').style.display     = 'none';
  document.getElementById('vistaDashboard').style.display = 'flex';
  document.getElementById('dashUser').textContent = userActual || '';
  const badge = document.getElementById('dashRol');
  badge.textContent = rolActual || '';
  badge.className = 'rol-badge badge-' + rolActual;
  construirSidebar();
}

function construirSidebar(){
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  const visibles = ORDEN_MODULOS.filter(k => puedoVer(k));

  visibles.forEach(k => {
    const mod = MODULOS[k];
    const item = document.createElement('div');
    item.className = 'sidebar-item';
    item.dataset.key = k;
    item.innerHTML = `<span class="si-icon">${mod.icono}</span>
                      <span class="si-name">${mod.titulo}</span>
                      ${puedoEscribir(k) ? '' : '<span class="si-lock" title="Solo lectura">👁️</span>'}`;
    item.onclick = () => cargarModulo(k);
    nav.appendChild(item);
  });

  if (visibles.length) cargarModulo(visibles[0]);
  else document.getElementById('contenidoPrincipal').innerHTML =
    '<p class="solo-lectura">Tu rol no tiene módulos asignados.</p>';
}

function cargarModulo(key){
  moduloActual = key;
  document.querySelectorAll('.sidebar-item').forEach(el =>
    el.classList.toggle('active', el.dataset.key === key));

  const mod  = MODULOS[key];
  const cont = document.getElementById('contenidoPrincipal');
  const escribir = puedoEscribir(key);

  cont.innerHTML = `
    <div class="modulo-top">
      <h2 class="modulo-titulo">${mod.icono} ${mod.titulo}</h2>
      <button class="btn-sec" onclick="cargarTabla('${key}')">↻ Actualizar</button>
    </div>
    <div id="feedback" class="feedback"></div>
    ${escribir
      ? renderFormulario(key)
      : '<p class="solo-lectura">👁️ Modo solo lectura — no tienes permisos de edición en este módulo.</p>'}
    <div class="tabla-wrap" id="tablaWrap"><p class="cargando">Cargando...</p></div>
  `;
  cargarTabla(key);
}

function renderFormulario(key){
  const mod = MODULOS[key];
  let html = `<form class="form-card" onsubmit="enviarFormulario(event,'${key}')"><div class="form-grid">`;
  mod.campos.forEach(c => {
    const full = (c.type === 'textarea') ? ' full' : '';
    html += `<div class="form-field${full}"><label>${c.label}${c.required ? ' *' : ''}</label>`;
    if (c.type === 'select') {
      html += `<select id="f_${c.name}" ${c.required ? 'required' : ''}>
                 <option value="" ${c.required ? 'disabled selected' : ''}>Seleccionar...</option>`;
      c.options.forEach(o => html += `<option value="${o}">${o}</option>`);
      html += `</select>`;
    } else if (c.type === 'textarea') {
      html += `<textarea id="f_${c.name}" rows="2" ${c.required ? 'required' : ''}></textarea>`;
    } else {
      const step = c.decimal ? ' step="any"' : '';
      html += `<input id="f_${c.name}" type="${c.type}"${step} ${c.required ? 'required' : ''} />`;
    }
    html += `</div>`;
  });
  html += `</div><button type="submit" class="btn-primary">Guardar</button></form>`;
  return html;
}

function construirPayload(key){
  const mod = MODULOS[key];
  const obj = {};
  mod.campos.forEach(c => {
    const el = document.getElementById('f_' + c.name);
    if (!el) return;
    const raw = el.value;
    if (raw === '' || raw === null) return;          // omitir vacíos
    obj[c.name] = (c.type === 'number') ? (c.decimal ? parseFloat(raw) : parseInt(raw, 10)) : raw;
  });
  if (mod.ajustarPayload) mod.ajustarPayload(obj);
  return obj;
}

/* ══════════════ TABLA ══════════════ */
async function cargarTabla(key){
  const wrap = document.getElementById('tablaWrap');
  if (wrap) wrap.innerHTML = '<p class="cargando">Cargando...</p>';
  try {
    const res = await apiFetch(MODULOS[key].endpoint);
    if (!res.ok) throw new Error('Error ' + res.status);
    const lista = extraerLista(await res.json());
    if (wrap) wrap.innerHTML = renderTabla(key, lista);
  } catch (err) {
    if (err.message === '401') return;
    if (wrap) wrap.innerHTML = `<p class="error-tabla">No se pudieron cargar los datos: ${escapeHtml(err.message)}</p>`;
  }
}

function valorCelda(col, row){
  const v = col.fmt ? col.fmt(row) : row[col.key];
  if (v === null || v === undefined || v === '') return '—';
  return escapeHtml(v);
}

function renderTabla(key, lista){
  const mod = MODULOS[key];
  const cols = mod.columnas;
  const conAcciones = puedoEscribir(key) && (mod.acciones || []).length > 0;
  const totalCols = cols.length + (conAcciones ? 1 : 0);

  let html = '<div class="tabla-scroll"><table class="data-table"><thead><tr>';
  cols.forEach(c => html += `<th>${c.label}</th>`);
  if (conAcciones) html += '<th>Acciones</th>';
  html += '</tr></thead><tbody>';

  if (!lista.length) {
    html += `<tr><td class="empty" colspan="${totalCols}">Sin registros</td></tr>`;
  } else {
    lista.forEach(row => {
      html += '<tr>';
      cols.forEach(c => html += `<td>${valorCelda(c, row)}</td>`);
      if (conAcciones) html += `<td><div class="acciones-cell">${celdaAcciones(key, row)}</div></td>`;
      html += '</tr>';
    });
  }
  html += '</tbody></table></div>';
  return html;
}

function celdaAcciones(key, row){
  const mod = MODULOS[key];
  const id  = row.id;
  let btns = '';
  (mod.acciones || []).forEach(a => {
    if (a === 'eliminar') {
      btns += `<button class="btn-sm btn-danger" onclick="accionEliminar('${key}',${id})">${mod.labelEliminar || 'Eliminar'}</button>`;
    } else if (a === 'stock') {
      btns += `<button class="btn-sm btn-mini-sec" onclick="accionStock(${id},'aumentar')">+ Stock</button>`;
      btns += `<button class="btn-sm btn-mini-sec" onclick="accionStock(${id},'reducir')">- Stock</button>`;
      btns += `<button class="btn-sm btn-danger" onclick="accionEliminar('${key}',${id})">Eliminar</button>`;
    } else if (a === 'pagar') {
      if (String(row.estado || '').toUpperCase() === 'PENDIENTE')
        btns += `<button class="btn-sm btn-mini-pri" onclick="accionPagar(${id})">Pagar</button>`;
      btns += `<button class="btn-sm btn-danger" onclick="accionEliminar('${key}',${id})">Anular</button>`;
    }
  });
  return btns || '—';
}

/* ══════════════ ACCIONES ══════════════ */
async function enviarFormulario(e, key){
  e.preventDefault();
  const payload = construirPayload(key);
  try {
    const res = await apiFetch(MODULOS[key].endpoint, { method:'POST', body: JSON.stringify(payload) });
    if (res.status === 401) return;
    if (!res.ok) throw new Error(parseError(await res.text(), res.status));
    showFeedback('exito', '✓ Registro guardado correctamente');
    e.target.reset();
    cargarTabla(key);
  } catch (err) {
    if (err.message !== '401') showFeedback('error', '⚠️ ' + err.message);
  }
}

async function accionEliminar(key, id){
  const verbo = MODULOS[key].labelEliminar || 'Eliminar';
  if (!confirm(`¿${verbo} el registro #${id}?`)) return;
  try {
    const res = await apiFetch(`${MODULOS[key].endpoint}/${id}`, { method:'DELETE' });
    if (res.status === 401) return;
    if (!res.ok) throw new Error(parseError(await res.text(), res.status));
    showFeedback('exito', `✓ Registro #${id} — operación realizada`);
    cargarTabla(key);
  } catch (err) {
    if (err.message !== '401') showFeedback('error', '⚠️ ' + err.message);
  }
}

async function accionStock(id, tipo){
  const entrada = prompt(`Cantidad a ${tipo}:`, '1');
  if (entrada === null) return;
  const n = parseInt(entrada, 10);
  if (isNaN(n) || n <= 0) { showFeedback('error', '⚠️ Cantidad inválida'); return; }
  try {
    const res = await apiFetch(`/api/productos/${id}/${tipo}`, { method:'PATCH', body: JSON.stringify({ cantidad:n }) });
    if (res.status === 401) return;
    if (!res.ok) throw new Error(parseError(await res.text(), res.status));
    showFeedback('exito', `✓ Stock ${tipo === 'aumentar' ? 'aumentado' : 'reducido'} en ${n}`);
    cargarTabla('inventario');
  } catch (err) {
    if (err.message !== '401') showFeedback('error', '⚠️ ' + err.message);
  }
}

async function accionPagar(id){
  const validos = ['EFECTIVO','TARJETA_DEBITO','TARJETA_CREDITO','TRANSFERENCIA'];
  const entrada = prompt('Método de pago (EFECTIVO, TARJETA_DEBITO, TARJETA_CREDITO, TRANSFERENCIA):', 'EFECTIVO');
  if (entrada === null) return;
  const m = entrada.trim().toUpperCase();
  if (!validos.includes(m)) { showFeedback('error', '⚠️ Método de pago inválido'); return; }
  try {
    const res = await apiFetch(`/api/facturas/${id}/pagar`, { method:'PATCH', body: JSON.stringify({ metodoPago:m }) });
    if (res.status === 401) return;
    if (!res.ok) throw new Error(parseError(await res.text(), res.status));
    showFeedback('exito', '✓ Factura pagada');
    cargarTabla('facturacion');
  } catch (err) {
    if (err.message !== '401') showFeedback('error', '⚠️ ' + err.message);
  }
}

/* ══════════════ FEEDBACK / SESIÓN ══════════════ */
let feedbackTimer = null;
function showFeedback(tipo, msg){
  const fb = document.getElementById('feedback');
  if (!fb) return;
  fb.textContent = msg;
  fb.className = 'feedback ' + tipo + ' show';
  if (feedbackTimer) clearTimeout(feedbackTimer);
  feedbackTimer = setTimeout(() => { fb.className = 'feedback'; fb.textContent = ''; }, 3000);
}

function sesionExpirada(){
  tokenActual = null; rolActual = null; userActual = null; moduloActual = null;
  document.getElementById('vistaDashboard').style.display = 'none';
  document.getElementById('vistaLogin').style.display = 'flex';
  document.getElementById('loginForm').reset();
  const err = document.getElementById('loginError');
  err.textContent = '⚠️ Sesión expirada. Vuelve a iniciar sesión.';
  err.style.display = 'block';
}

function logout(){
  tokenActual = null; rolActual = null; userActual = null; moduloActual = null;
  document.getElementById('vistaDashboard').style.display = 'none';
  document.getElementById('vistaLogin').style.display = 'flex';
  document.getElementById('loginForm').reset();
  document.getElementById('loginError').style.display = 'none';
}

// Al cargar la página → mostrar solo la vista de login
document.getElementById('vistaLogin').style.display = 'flex';
document.getElementById('vistaDashboard').style.display = 'none';
</script>
